<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Message</title>
    <link rel="stylesheet" href="1.css">
</head>
<body>

    <div class="wrapper">
        <input type="checkbox" id="card-toggle">
        
        <label for="card-toggle" class="card">
            <div class="envelope-front">
                <div class="heart"></div>
                <p class="click-me">Click the heart...</p>
            </div>
            
            <div class="letter-content">
                <h2>Hey Stutee,</h2>
                <p>I've been wanting to tell you something for a while, but I figured a little website might be easier than saying it out loud.</p>
                <p class="confession">I really like you. A lot.</p>
                <p>I'd love to take you out sometime if you're down.</p>
                <span class="signature">— Ayush</span>
            </div>
        </label>
    </div>

</body>
</html>
